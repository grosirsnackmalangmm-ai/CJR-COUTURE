<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        // 1. MASUKKAN LINK GOOGLE SHEETS ANDA DI SINI
        let rawSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLAgyV7AjoFwARtvgnshPSZf2r9DWzpIzjRRoyUmodA6kg5ALfTLSqNOVDHwFwSqa12xkzUIefBaXO/pubhtml";
        
        const whatsappNumber = "6281234567890"; // Ganti nomor WA Anda

        if (rawSheetUrl.includes("pubhtml")) {
            rawSheetUrl = rawSheetUrl.replace("pubhtml", "pub") + "?gid=0&single=true&output=csv";
        }

        let globalProductsData = [];
        const elegantFallbackPlaceholder = "https://images.unsplash.com/photo-1595777457583-95e059d581b8?auto=format&fit=crop&w=800&q=80";

        // FITUR BARU: AUTO-FIX GOOGLE DRIVE LINKS
        function fixImageUrl(url) {
            if (!url) return elegantFallbackPlaceholder;
            let cleanUrl = url.trim();
            
            // Mengubah link Google Drive biasa menjadi link direct image
            if (cleanUrl.includes("drive.google.com/file/d/")) {
                const match = cleanUrl.match(/\/d\/(.*?)\//);
                if (match && match[1]) {
                    return `https://drive.google.com/uc?export=view&id=${match[1]}`;
                }
            } else if (cleanUrl.includes("drive.google.com/open?id=")) {
                const id = cleanUrl.split("id=")[1];
                return `https://drive.google.com/uc?export=view&id=${id}`;
            }
            return cleanUrl;
        }

        function fetchAtelierDatabase() {
            fetch(rawSheetUrl)
                .then(res => {
                    if(!res.ok) throw new Error("CORS / Broken Link Detected");
                    return res.text();
                })
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: false,
                        skipEmptyLines: true,
                        complete: function(results) {
                            const dataBaris = results.data;
                            if(dataBaris.length <= 1) {
                                activateSimulatedCatalog(true);
                            } else {
                                parseAndBuildDatabase(dataBaris.slice(1));
                            }
                        }
                    });
                })
                .catch(err => {
                    console.error("Error Fetching Data:", err);
                    activateSimulatedCatalog(true);
                });
        }

        function parseAndBuildDatabase(rawRows) {
            globalProductsData = rawRows.map((row, index) => {
                const namaBaju = row[0] ? row[0].trim() : '';
                if(!namaBaju) return null; 

                return {
                    id: index,
                    nama: namaBaju,
                    kategori: row[1] ? row[1].trim() : 'Couture Collection',
                    deskripsi: row[2] ? row[2].trim() : 'Mahakarya gaun eksklusif.',
                    statusNew: row[3] ? row[3].trim().toLowerCase() : '',
                    harga: row[4] ? row[4].trim() : 'Price by Request',
                    gambar: fixImageUrl(row[5]) // Menggunakan Auto-Fix
                };
            }).filter(item => item !== null);

            if(globalProductsData.length === 0) {
                activateSimulatedCatalog(true);
            } else {
                renderCatalog(globalProductsData);
                document.getElementById('loader-panel').style.opacity = '0';
                setTimeout(() => document.getElementById('loader-panel').classList.add('hide'), 400);
            }
        }

        function renderCatalog(items) {
            const wrapper = document.getElementById('catalog-wrapper');
            wrapper.innerHTML = '';

            items.forEach(product => {
                const isNewBadge = product.statusNew === 'new' ? `<span class="badge-new">New Arrival</span>` : '';
                
                const cardHtml = `
                    <div class="product-card" data-category="${product.kategori.toLowerCase()}" onclick="openQuickView(${product.id})">
                        <div class="image-container">
                            ${isNewBadge}
                            <img class="product-image" src="${product.gambar}" alt="${product.nama}" onerror="this.onerror=null; this.src='${elegantFallbackPlaceholder}';">
                        </div>
                        <div class="card-details">
                            <div>
                                <span class="product-category">${product.kategori}</span>
                                <h3 class="product-title">${product.nama}</h3>
                                <p class="product-desc">${product.deskripsi}</p>
                            </div>
                            <div class="product-price">${product.harga}</div>
                        </div>
                    </div>
                `;
                wrapper.innerHTML += cardHtml;
            });
        }

        function filterCategory(selectedCat) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if(selectedCat === 'all') {
                renderCatalog(globalProductsData);
            } else {
                const filtered = globalProductsData.filter(p => p.kategori.toLowerCase() === selectedCat);
                renderCatalog(filtered);
            }
        }

        function openQuickView(id) {
            const targetProduct = globalProductsData.find(p => p.id === id);
            if(!targetProduct) return;

            document.getElementById('modal-img').src = targetProduct.gambar;
            document.getElementById('modal-cat').innerText = targetProduct.kategori;
            document.getElementById('modal-title').innerText = targetProduct.nama;
            document.getElementById('modal-desc').innerText = targetProduct.deskripsi;
            document.getElementById('modal-price').innerText = targetProduct.harga;

            const waMessage = encodeURIComponent(`Halo CJR Couture, saya tertarik untuk berkonsultasi mengenai koleksi gaun:\n\n*Nama Baju:* ${targetProduct.nama}\n*Harga:* ${targetProduct.harga}`);
            document.getElementById('modal-wa-btn').href = `https://api.whatsapp.com/send?phone=${whatsappNumber}&text=${waMessage}`;

            document.getElementById('product-modal').classList.add('active');
        }

        function closeModal(e) {
            document.getElementById('product-modal').classList.remove('active');
        }

        function activateSimulatedCatalog(showWarning) {
            if(showWarning) document.getElementById('warning-box').classList.remove('hide');
            
            const dummyDatabase = [
                { id: 101, nama: "The Royal Seraphina", kategori: "Wedding Gown", deskripsi: "Gaun pengantin haute couture megah bertabur mutiara premium.", statusNew: "new", harga: "Rp 45.000.000", gambar: "https://images.unsplash.com/photo-1594552072238-16e6f4773a97?auto=format&fit=crop&w=800&q=80" },
                { id: 102, nama: "Golden Hour Muse", kategori: "Engagement Dress", deskripsi: "Gaun tunangan beraksen payet emas transparan.", statusNew: "new", harga: "Rp 18.500.000", gambar: "https://images.unsplash.com/photo-1595777457583-95e059d581b8?auto=format&fit=crop&w=800&q=80" }
            ];

            globalProductsData = dummyDatabase;
            renderCatalog(globalProductsData);
            
            document.getElementById('loader-panel').style.opacity = '0';
            setTimeout(() => document.getElementById('loader-panel').classList.add('hide'), 400);
        }

        window.onload = fetchAtelierDatabase;
    </script>
