<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJR Couture | Haute Couture Catalog</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* === LUXURY COUTURE PALETTE === */
        :root {
            --bg-color: #ffffff;
            --surface-color: #fafafa;
            --surface-card: #ffffff;
            --text-primary: #111111;
            --text-muted: #666666;
            --gold: #c59b27;
            --gold-light: #fdfaf3;
            --gold-dark: #99741d;
            --font-display: 'Cinzel', serif;
            --font-body: 'Montserrat', sans-serif;
            --shadow-sm: 0 4px 15px rgba(0,0,0,0.02);
            --shadow-md: 0 15px 35px rgba(0,0,0,0.06);
            --shadow-lg: 0 25px 50px rgba(0,0,0,0.1);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* === SECURITY STYLE (ANTI-SELECT) === */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        input, textarea { -webkit-user-select: text; user-select: text; }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            font-family: var(--font-body); 
            line-height: 1.6; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
        }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--surface-color); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* Loader Panel */
        #loader-panel { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease, visibility 0.5s; }
        .spinner { width: 45px; height: 45px; border: 2px solid rgba(197, 155, 39, 0.1); border-top: 2px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { font-family: var(--font-display); letter-spacing: 5px; color: var(--gold); font-size: 0.75rem; text-transform: uppercase; font-weight: 500; }

        /* Header Premium Glassmorphism */
        header { background-color: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 25px 40px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(0, 0, 0, 0.03); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-sm); transition: var(--transition); }
        header.scrolled { padding: 15px 40px; background-color: rgba(255, 255, 255, 0.95); }
        .header-left, .header-right { width: 80px; } 
        .header-center { text-align: center; }
        .brand-logo { font-family: var(--font-display); font-size: 2.6rem; letter-spacing: 18px; color: var(--text-primary); text-decoration: none; display: block; font-weight: 500; text-indent: 18px; line-height: 1; }
        .brand-subtitle { font-size: 0.65rem; letter-spacing: 12px; color: var(--gold); text-transform: uppercase; font-weight: 500; text-indent: 12px; margin-top: 8px; }
        .header-right { text-align: right; }
        
        .cart-icon-btn { background: none; border: none; color: var(--text-primary); font-size: 1.35rem; cursor: pointer; position: relative; transition: var(--transition); padding: 5px; }
        .cart-icon-btn:hover { color: var(--gold); transform: scale(1.05); }
        .cart-badge { position: absolute; top: -2px; right: -6px; background: var(--gold); color: #fff; font-size: 0.6rem; font-weight: 600; width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 3px 8px rgba(197, 155, 39, 0.3); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .cart-badge.bump { transform: scale(1.3); }

        .container { max-width: 1440px; margin: 0 auto; padding: 40px 40px 80px; }
        @media (max-width: 768px) { .container { padding: 25px 15px 60px; } header { padding: 15px 15px; } .brand-logo { font-size: 1.8rem; letter-spacing: 12px; } }
        
        /* New Arrival Section */
        .new-arrival-section { padding: 50px 40px 20px; background: #fafafa; border-bottom: 1px solid rgba(0, 0, 0, 0.01); }
        .swiper { width: 100%; padding-bottom: 50px !important; }
        .swiper-pagination-bullet { background: #ccc !important; opacity: 0.5; transition: var(--transition); width: 6px; height: 6px; }
        .swiper-pagination-bullet-active { background: var(--gold) !important; opacity: 1; width: 25px; border-radius: 4px; }

        /* Filter Kategori Luxury */
        .filter-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 50px; }
        .filter-btn { background: transparent; border: 1px solid #eaeaea; color: var(--text-muted); padding: 10px 24px; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: var(--transition); border-radius: 2px; font-weight: 500; font-family: var(--font-body); }
        .filter-btn:hover, .filter-btn.active { color: var(--gold); border-color: var(--gold); background-color: var(--gold-light); }

        .section-header { text-align: center; margin-bottom: 45px; }
        .section-header h2 { font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 6px; text-transform: uppercase; font-weight: 400; padding-bottom: 12px; display: inline-block; position: relative; color: var(--text-primary); }
        .section-header h2::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 1px; background-color: var(--gold); }

        /* Grid Katalog */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px 25px; }
        .product-card { background-color: var(--surface-card); display: flex; flex-direction: column; cursor: pointer; transition: var(--transition); position: relative; height: 100%; overflow: hidden; border-radius: 4px; box-shadow: var(--shadow-sm); }
        .product-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-md); }
        
        /* PROTECTION LAYERS ON IMAGE */
        .image-container { position: relative; width: 100%; padding-top: 145%; background-color: #f7f7f7; overflow: hidden; }
        .product-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; -webkit-user-drag: none; user-drag: none; }
        .product-card:hover .product-image { transform: scale(1.06); }
        
        .invisible-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; background: transparent; }
        
        .watermark { position: absolute; bottom: 15px; right: 20px; font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; color: rgba(255, 255, 255, 0.45); letter-spacing: 5px; z-index: 4; pointer-events: none; text-shadow: 1px 2px 4px rgba(0,0,0,0.15); }
        .badge-new { position: absolute; top: 15px; left: 15px; background-color: var(--gold); color: #fff; font-size: 0.6rem; font-weight: 600; text-transform: uppercase; padding: 5px 12px; letter-spacing: 2px; z-index: 4; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-radius: 2px; }

        .card-details { padding: 22px 18px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; background: #fff; border: 1px solid #f7f7f7; border-top: none; }
        .product-category { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 600; }
        .product-title { font-family: var(--font-display); font-size: 1.1rem; margin-bottom: 12px; color: var(--text-primary); letter-spacing: 0.5px; font-weight: 500; line-height: 1.4; }
        .product-price { font-size: 0.85rem; margin-top: auto; border-top: 1px solid #fbfbfb; padding-top: 15px; color: var(--text-muted); font-weight: 500; }

        /* Modal Pop-up */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: var(--transition); padding: 20px; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-wrapper { background-color: #fff; max-width: 950px; width: 100%; display: flex; position: relative; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg); transform: translateY(20px); transition: var(--transition); border-radius: 4px; overflow: hidden; }
        .modal.active .modal-wrapper { transform: translateY(0); }
        @media (max-width: 768px) { .modal-wrapper { flex-direction: column; } .modal-image-side { min-height: 400px; } }
        
        .modal-image-side { flex: 1; background-color: #fafafa; position: relative; display: flex; justify-content: center; align-items: center; padding: 15px; border-right: 1px solid #f5f5f5; overflow: hidden; }
        .modal-image-side img { width: 100%; height: 100%; max-height: 550px; object-fit: contain; position: relative; z-index: 2; pointer-events: none; -webkit-user-drag: none; user-drag: none; }

        .modal-watermark-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" opacity="0.06" transform="rotate(-25)"><text y="120" x="20" fill="%23000" font-family="Cinzel" font-size="16" font-weight="bold" letter-spacing="4">CJR COUTURE</text></svg>');
            background-repeat: repeat; z-index: 4; pointer-events: none;
        }

        .modal-info-side { flex: 1.1; padding: 50px 45px; display: flex; flex-direction: column; justify-content: center; background: #ffffff; }
        @media (max-width: 500px) { .modal-info-side { padding: 35px 20px; } }
        .close-modal-btn { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #111; font-size: 1.4rem; cursor: pointer; z-index: 10; opacity: 0.5; transition: var(--transition); width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; border-radius: 50%; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); }
        .close-modal-btn:hover { color: var(--gold); opacity: 1; transform: rotate(90deg); }
        
        .modal-cat { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px; font-weight: 600; }
        .modal-title { font-family: var(--font-display); font-size: 2rem; margin-bottom: 18px; color: var(--text-primary); letter-spacing: 0.5px; font-weight: 500; line-height: 1.2; }
        .modal-desc { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 30px; line-height: 1.8; }
        .modal-price { font-size: 1.35rem; font-weight: 500; margin-bottom: 30px; color: var(--gold-dark); letter-spacing: 0.5px; border-bottom: 1px solid #f5f5f5; padding-bottom: 20px; }
        
        .btn-gold { background-color: var(--text-primary); color: #fff; border: 1px solid var(--text-primary); padding: 16px; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; font-weight: 500; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: var(--transition); width: 100%; border-radius: 2px; }
        .btn-gold:hover { background-color: var(--gold); border-color: var(--gold); box-shadow: 0 8px 20px rgba(197, 155, 39, 0.2); transform: translateY(-2px); }

        /* Sidebar Wishlist */
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.25); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 1001; opacity: 0; pointer-events: none; transition: var(--transition); }
        .cart-overlay.active { opacity: 1; pointer-events: auto; }
        
        .cart-sidebar { position: fixed; top: 0; right: -460px; width: 100%; max-width: 430px; height: 100vh; background: #ffffff; z-index: 1002; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; box-shadow: var(--shadow-lg); }
        .cart-sidebar.open { right: 0; }
        
        .cart-header { padding: 30px 25px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
        .cart-header h3 { font-family: var(--font-display); font-size: 1.15rem; letter-spacing: 2px; color: var(--text-primary); font-weight: 500; text-transform: uppercase; }
        .close-cart-btn { background: none; border: none; color: #222; font-size: 1.2rem; cursor: pointer; opacity: 0.5; transition: var(--transition); }
        .close-cart-btn:hover { color: var(--gold); opacity: 1; transform: rotate(90deg); }

        .cart-items { flex-grow: 1; overflow-y: auto; padding: 25px; }
        .cart-item { display: flex; gap: 15px; margin-bottom: 25px; padding-bottom: 25px; border-bottom: 1px solid #f7f7f7; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .cart-item-img-wrapper { width: 75px; height: 105px; position: relative; background: #fafafa; border-radius: 2px; overflow: hidden; flex-shrink: 0; }
        .cart-item-img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .cart-item-info { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .cart-item-title { font-family: var(--font-display); font-size: 0.95rem; color: var(--text-primary); font-weight: 600; }
        .cart-item-category { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; }
        
        .cart-item-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .exclusive-badge { font-size: 0.55rem; color: var(--gold); border: 1px solid rgba(197, 155, 39, 0.2); padding: 3px 8px; text-transform: uppercase; letter-spacing: 1px; background: var(--gold-light); font-weight: 500; }
        .remove-btn { color: #aaa; background: none; border: none; cursor: pointer; font-size: 0.7rem; transition: var(--transition); display: flex; align-items: center; gap: 4px; font-family: var(--font-body); text-transform: uppercase; letter-spacing: 1px; }
        .remove-btn:hover { color: #d9534f; }

        .cart-footer { padding: 30px 25px; border-top: 1px solid #f5f5f5; background: #fafafa; }
        .checkout-wa-btn { background: #25D366; color: #fff; border: none; width: 100%; padding: 18px; font-family: var(--font-body); font-weight: 600; font-size: 0.8rem; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: var(--transition); box-shadow: 0 4px 12px rgba(37, 211, 102, 0.15); border-radius: 4px; }
        .checkout-wa-btn:hover { background: #1ebe57; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.25); }

        .empty-cart { text-align: center; color: #bbb; font-size: 0.8rem; padding-top: 80px; }
        .empty-cart i { font-size: 2.5rem; color: #e5e5e5; margin-bottom: 20px; display: block; }

        /* Toast Notification */
        #toast-container { position: fixed; bottom: 25px; right: 25px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: #111; color: #fff; padding: 15px 25px; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-lg); animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; pointer-events: auto; border-radius: 3px; border-left: 3px solid var(--gold); }
        .toast i { color: var(--gold); font-size: 1rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { to { transform: translateX(100%); opacity: 0; } }

        /* Back To Top */
        #backToTop { position: fixed; bottom: 25px; left: 25px; background-color: #fff; color: var(--text-primary); border: 1px solid #eee; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1rem; cursor: pointer; z-index: 999; opacity: 0; pointer-events: none; transition: var(--transition); box-shadow: var(--shadow-sm); }
        #backToTop.show { opacity: 1; pointer-events: auto; }
        #backToTop:hover { border-color: var(--gold); color: #fff; background-color: var(--gold); transform: translateY(-3px); }

        .hide { display: none !important; opacity: 0 !important; visibility: hidden !important; }
    </style>
</head>
<body>

    <button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <header id="main-header">
        <div class="header-left"></div>
        <div class="header-center">
            <a href="#" class="brand-logo">CJR</a>
            <div class="brand-subtitle">Couture</div>
        </div>
        <div class="header-right">
            <button class="cart-icon-btn" onclick="toggleCart()">
                <i class="fa-solid fa-bag-shopping"></i>
                <span class="cart-badge" id="cart-count">0</span>
            </button>
        </div>
    </header>

    <div id="loader-panel">
        <div class="spinner"></div>
        <div class="loader-text">Loading Collection</div>
    </div>

    <div id="toast-container"></div>

    <section class="new-arrival-section hide" id="new-arrival-section">
        <div class="section-header" style="margin-bottom: 35px;">
            <h2>New Arrival</h2>
        </div>
        <div style="max-width: 1440px; margin: 0 auto;">
            <div class="swiper newArrivalSwiper">
                <div class="swiper-wrapper" id="new-arrival-wrapper"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </section>

    <main class="container">
        <div class="filter-container" id="filter-wrapper">
            <button class="filter-btn active" onclick="filterCategory('all', event)">All Collection</button>
            <button class="filter-btn" onclick="filterCategory('cocktail dress', event)">Cocktail Dress</button>
            <button class="filter-btn" onclick="filterCategory('evening dress', event)">Evening Dress</button>
            <button class="filter-btn" onclick="filterCategory('engagement dress', event)">Engagement Dress</button>
            <button class="filter-btn" onclick="filterCategory('brides robe', event)">Brides Robe</button>
            <button class="filter-btn" onclick="filterCategory('wedding gown', event)">Wedding Gown</button>
            <button class="filter-btn" onclick="filterCategory('moms gown', event)">Mom's Gown</button>
        </div>

        <div class="section-header">
            <h2>The Masterpiece</h2>
        </div>

        <div class="catalog-grid" id="catalog-wrapper"></div>
    </main>

    <div class="modal" id="product-modal" onclick="closeModal()">
        <div class="modal-wrapper" onclick="event.stopPropagation()">
            <button class="close-modal-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            
            <div class="modal-image-side">
                <div class="modal-watermark-overlay"></div>
                <div class="invisible-shield"></div>
                <img id="modal-img" src="" alt="Koleksi Gambar">
            </div>
            
            <div class="modal-info-side">
                <span class="modal-cat" id="modal-cat">Kategori</span>
                <h3 class="modal-title" id="modal-title">Nama Gaun</h3>
                <p class="modal-desc" id="modal-desc">Deskripsi gaun</p>
                <div class="modal-price" id="modal-price">Harga</div> 
                <button id="modal-add-btn" class="btn-gold" onclick="addToCartFromModal()">
                    <i class="fa-regular fa-heart"></i> Tambah ke Wishlist
                </button>
            </div>
        </div>
    </div>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3><i class="fa-regular fa-heart" style="color: var(--gold);"></i> My Wishlist</h3>
            <button class="close-cart-btn" onclick="toggleCart()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <button class="checkout-wa-btn" onclick="checkoutWA()">
                <i class="fa-brands fa-whatsapp" style="font-size: 1.3rem;"></i> Hubungi CJR via WA
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <script>
        // Security Anti-Salin & Anti-Inspect
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) return false;
            if (e.ctrlKey && e.keyCode == 85) return false;
            if (e.ctrlKey && e.keyCode == 83) return false;
        };

        const rawSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLAgyV7AjoFwARtvgnshPSZf2r9DWzpIzjRRoyUmodA6kg5ALfTLSqNOVDHwFwSqa12xkzUIefBaXO/pub?gid=0&single=true&output=csv";
        const whatsappNumber = "6282336975199"; 
        const placeholderImg = "https://placehold.co/600x800/f5f5f5/c59b27?text=CJR+Couture";

        let globalProductsData = [];
        let currentModalProductId = null;
        let cart = JSON.parse(localStorage.getItem('cjr_cart_v2')) || [];

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            const header = document.getElementById('main-header');
            if (window.scrollY > 80) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
            if (window.scrollY > 300) btn.classList.add('show');
            else btn.classList.remove('show');
        });

        // === BYPASS GAMBAR GOOGLE DRIVE TERBARU ===
        function parseImageUrl(url) {
            if (!url || url.trim() === "") return placeholderImg;
            let str = url.trim();
            // Cek apakah ini link Google Drive
            let match = str.match(/(?:\/d\/|id=)([\w-]+)/);
            if (match && match[1]) {
                // Menggunakan endpoint lh3 yang jarang diblokir Google
                return `https://lh3.googleusercontent.com/d/${match[1]}=w1000`;
            }
            return str;
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fa-solid fa-gem"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                toast.addEventListener('animationend', () => toast.remove());
            }, 3000);
        }

        function fetchData() {
            const antiCacheUrl = rawSheetUrl + "&t=" + new Date().getTime();
            fetch(antiCacheUrl)
                .then(res => res.text())
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: false,
                        skipEmptyLines: true,
                        complete: function(results) {
                            if (results.data.length > 1) buildDatabase(results.data.slice(1));
                            else closeLoader();
                        }
                    });
                }).catch(err => closeLoader());
        }

        function buildDatabase(rows) {
            globalProductsData = rows.map((row, index) => {
                if (!row || row.length === 0 || !row[0]) return null;
                
                let statusSembunyi = (row[6] || '').toString().trim().toLowerCase();
                if (['kosong', 'sold', 'sembunyi'].includes(statusSembunyi)) return null;

                let hargaText = (row[4] || '').trim();
                if (hargaText === '' || hargaText.toLowerCase().includes('request')) hargaText = 'Bespoke Inquiry';

                return {
                    id: index,
                    nama: row[0].trim(),
                    kategori: (row[1] || 'Exclusive').trim(),
                    deskripsi: (row[2] || '-').trim(),
                    statusNew: (row[3] || '').trim().toLowerCase(),
                    harga: hargaText,
                    gambar: parseImageUrl(row[5])
                };
            }).filter(item => item !== null);

            renderNewArrivals();
            renderCatalog(globalProductsData);
            updateCartUI(); 
            closeLoader();
        }

        function createCardHTML(product) {
            const isNew = product.statusNew.includes('new') ? `<span class="badge-new">New Arrival</span>` : '';
            return `
                <div class="product-card" onclick="openModal(${product.id})">
                    <div class="image-container">
                        ${isNew}
                        <div class="watermark">CJR</div>
                        <div class="invisible-shield"></div>
                        <img class="product-image" src="${product.gambar}" alt="${product.nama}" loading="lazy" onerror="this.onerror=null; this.src='${placeholderImg}';">
                    </div>
                    <div class="card-details">
                        <span class="product-category">${product.kategori}</span>
                        <h3 class="product-title">${product.nama}</h3>
                        <div class="product-price">${product.harga}</div>
                    </div>
                </div>
            `;
        }

        function renderNewArrivals() {
            const newArrivals = globalProductsData.filter(p => p.statusNew.includes('new'));
            const section = document.getElementById('new-arrival-section');
            const wrapper = document.getElementById('new-arrival-wrapper');
            wrapper.innerHTML = '';
            if(newArrivals.length > 0) {
                section.classList.remove('hide');
                newArrivals.forEach(p => wrapper.innerHTML += `<div class="swiper-slide">${createCardHTML(p)}</div>`);
                new Swiper(".newArrivalSwiper", {
                    slidesPerView: 1, spaceBetween: 25, autoplay: { delay: 4000, disableOnInteraction: false }, pagination: { el: ".swiper-pagination", clickable: true },
                    breakpoints: { 480: { slidesPerView: 2 }, 850: { slidesPerView: 3 }, 1200: { slidesPerView: 4 } }
                });
            } else { section.classList.add('hide'); }
        }

        function renderCatalog(items) {
            const wrapper = document.getElementById('catalog-wrapper');
            wrapper.innerHTML = '';
            if(items.length === 0) {
                wrapper.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #999; padding: 40px; font-size: 0.9rem;">Koleksi tidak ditemukan.</div>`;
                return;
            }
            items.forEach(p => wrapper.innerHTML += createCardHTML(p));
        }

        function filterCategory(cat, event) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (event) event.target.classList.add('active');
            if (cat === 'all') renderCatalog(globalProductsData);
            else renderCatalog(globalProductsData.filter(p => p.kategori.toLowerCase().includes(cat.toLowerCase())));
        }

        function openModal(id) {
            const prod = globalProductsData.find(p => p.id === id);
            if(!prod) return;
            currentModalProductId = id;

            document.getElementById('modal-img').src = prod.gambar;
            document.getElementById('modal-cat').innerText = prod.kategori;
            document.getElementById('modal-title').innerText = prod.nama;
            document.getElementById('modal-desc').innerText = prod.deskripsi;
            document.getElementById('modal-price').innerText = prod.harga;
            document.getElementById('product-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('product-modal').classList.remove('active'); }
        
        function closeLoader() {
            const loader = document.getElementById('loader-panel');
            if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.classList.add('hide'), 500); }
        }
        
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            document.getElementById('cart-overlay').classList.toggle('active');
        }

        function addToCartFromModal() {
            if(currentModalProductId === null) return;
            const product = globalProductsData.find(p => p.id === currentModalProductId);
            if(!product) return;

            if(cart.find(item => item.id === product.id)) {
                showToast("Koleksi ini sudah ada di daftar Wishlist.");
            } else {
                cart.push(product);
                saveCart();
                closeModal();
                toggleCart();
                const badge = document.getElementById('cart-count');
                badge.classList.add('bump');
                setTimeout(() => badge.classList.remove('bump'), 300);
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
        }

        function saveCart() {
            localStorage.setItem('cjr_cart_v2', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const containerItem = document.getElementById('cart-items');
            const penandaJumlah = document.getElementById('cart-count');
            containerItem.innerHTML = '';

            if(cart.length === 0) {
                containerItem.innerHTML = `
                    <div class="empty-cart">
                        <i class="fa-regular fa-heart"></i>
                        <p>Daftar wishlist impian Anda masih kosong.</p>
                    </div>
                `;
            } else {
                cart.forEach((item) => {
                    containerItem.innerHTML += `
                        <div class="cart-item">
                            <div class="cart-item-img-wrapper">
                                <div class="invisible-shield"></div>
                                <img src="${item.gambar || placeholderImg}" class="cart-item-img" onerror="this.onerror=null; this.src='${placeholderImg}';">
                            </div>
                            <div class="cart-item-info">
                                <div>
                                    <div class="cart-item-title">${item.nama}</div>
                                    <div class="cart-item-category">${item.kategori}</div>
                                </div>
                                <div class="cart-item-actions">
                                    <span class="exclusive-badge">1 Pcs Only</span>
                                    <button class="remove-btn" onclick="removeFromCart(${item.id})"><i class="fa-solid fa-xmark"></i> Hapus</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            penandaJumlah.innerText = cart.length; 
        }

        function checkoutWA() {
            if(cart.length === 0) {
                showToast("Wishlist Anda masih kosong.");
                return;
            }

            const jam = new Date().getHours();
            let sapaan = "Selamat pagi";
            if (jam >= 11 && jam < 15) sapaan = "Selamat siang";
            else if (jam >= 15 && jam < 18) sapaan = "Selamat sore";
            else if (jam >= 18) sapaan = "Selamat malam";

            let isiPesan = `${sapaan} tim *CJR Couture*.\n\nSaya melihat katalog dan sangat tertarik untuk berdiskusi lebih lanjut mengenai koleksi eksklusif berikut:\n\n`;
            
            cart.forEach((item, index) => {
                isiPesan += `${index + 1}. *${item.nama}*\n    ▪ Kategori: ${item.kategori}\n    ▪ Info Harga: ${item.harga}\n\n`;
            });

            isiPesan += `Mohon info ketersediaan barang, tata cara pemesanan, serta jadwal untuk fitting. Terima kasih.`;

            const linkWhatsApp = `https://api.whatsapp.com/send?phone=${whatsappNumber}&text=${encodeURIComponent(isiPesan)}`;
            window.open(linkWhatsApp, '_blank');
        }

        window.onload = fetchData;
    </script>
</body>
</html>
