<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJR Couture | Haute Couture Masterpiece</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* === ULTRA LUXURY EDITORIAL PALETTE === */
        :root {
            --bg-color: #fdfbf9; /* Ivory white */
            --surface-color: #ffffff;
            --text-primary: #0a0a0a;
            --text-muted: #7a7a7a;
            --gold: #b38b22;
            --gold-light: #f9f6ef;
            --border-light: #ece9e4;
            --font-display: 'Cinzel', serif;
            --font-body: 'Jost', sans-serif;
            --transition-slow: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            --transition-fast: all 0.4s ease;
        }

        /* === ANTI-THEFT SECURITY === */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-drag: none; }
        input, textarea { user-select: text; }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            font-family: var(--font-body); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #ddd; }

        /* Loader Minimalis */
        #loader-panel { position: fixed; inset: 0; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease; }
        .loader-logo { font-family: var(--font-display); font-size: 2rem; letter-spacing: 15px; color: var(--text-primary); animation: pulse 2s infinite alternate; }
        @keyframes pulse { 0% { opacity: 0.3; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1); } }

        /* Scroll Animation Observer */
        .reveal { opacity: 0; transform: translateY(40px); transition: 1.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Header Premium */
        header { 
            background: rgba(253, 251, 249, 0.9); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            padding: 25px 50px; position: sticky; top: 0; z-index: 100; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid transparent; transition: var(--transition-slow); 
        }
        header.scrolled { padding: 15px 50px; border-bottom-color: var(--border-light); }
        .header-side { width: 100px; } 
        .header-center { text-align: center; }
        .brand-logo { font-family: var(--font-display); font-size: 2.2rem; letter-spacing: 20px; color: var(--text-primary); text-decoration: none; text-indent: 20px; line-height: 1; }
        .brand-subtitle { font-size: 0.6rem; letter-spacing: 14px; color: var(--gold); text-transform: uppercase; margin-top: 10px; text-indent: 14px; font-weight: 300; }
        
        .cart-icon-btn { background: none; border: none; color: var(--text-primary); font-size: 1.2rem; cursor: pointer; position: relative; transition: var(--transition-fast); }
        .cart-icon-btn:hover { color: var(--gold); }
        .cart-badge { position: absolute; top: -5px; right: -8px; background: var(--text-primary); color: #fff; font-size: 0.55rem; width: 16px; height: 16px; border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: var(--transition-fast); }

        .container { max-width: 1600px; margin: 0 auto; padding: 60px 50px 100px; }
        @media (max-width: 768px) { .container { padding: 30px 20px 80px; } header { padding: 15px 20px; } .brand-logo { font-size: 1.6rem; letter-spacing: 12px; } }

        /* Editorial Section Header */
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 10px; text-transform: uppercase; font-weight: 400; color: var(--text-primary); }
        .section-header p { font-size: 0.8rem; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-top: 15px; }
        .divider { width: 1px; height: 40px; background: var(--gold); margin: 20px auto 0; }

        /* Minimalist Filters */
        .filter-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-bottom: 70px; }
        .filter-btn { background: none; border: none; border-bottom: 1px solid transparent; color: var(--text-muted); padding: 5px 0; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: var(--transition-fast); font-family: var(--font-body); }
        .filter-btn:hover, .filter-btn.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }

        /* Editorial Grid */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 60px 40px; }
        .product-card { cursor: pointer; transition: var(--transition-slow); position: relative; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-10px); }
        
        /* Protection Layer & Image */
        .image-container { position: relative; width: 100%; padding-top: 150%; background: #f0f0f0; overflow: hidden; }
        .product-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 2s cubic-bezier(0.2, 0.8, 0.2, 1); filter: contrast(1.05); }
        .product-card:hover .product-image { transform: scale(1.05); }
        .invisible-shield { position: absolute; inset: 0; z-index: 3; background: transparent; }
        
        .watermark { position: absolute; bottom: 20px; right: 20px; font-family: var(--font-display); font-size: 1.2rem; color: rgba(255,255,255,0.6); letter-spacing: 8px; z-index: 4; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .badge-new { position: absolute; top: 20px; left: 20px; border: 1px solid rgba(255,255,255,0.4); color: #fff; font-size: 0.6rem; letter-spacing: 3px; padding: 6px 15px; text-transform: uppercase; z-index: 4; backdrop-filter: blur(5px); }

        .card-details { padding: 25px 0 0; text-align: center; }
        .product-category { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 12px; display: block; }
        .product-title { font-family: var(--font-display); font-size: 1.2rem; color: var(--text-primary); letter-spacing: 2px; font-weight: 400; margin-bottom: 15px; }
        .product-price { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 2px; font-weight: 300; }

        /* Cinematic Modal */
        .modal { position: fixed; inset: 0; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: var(--transition-slow); padding: 20px; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-wrapper { max-width: 1200px; width: 100%; height: 85vh; display: flex; background: var(--bg-color); position: relative; transform: scale(0.98); transition: var(--transition-slow); opacity: 0; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .modal.active .modal-wrapper { transform: scale(1); opacity: 1; }
        
        @media (max-width: 900px) { .modal-wrapper { flex-direction: column; height: 90vh; overflow-y: auto; } .modal-image-side { height: 50vh; flex: none; } }
        
        .modal-image-side { flex: 1.2; position: relative; background: #e5e5e5; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .modal-image-side img { width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 2; }
        .modal-watermark-overlay { position: absolute; inset: 0; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" opacity="0.08" transform="rotate(-30)"><text y="150" x="20" fill="%23fff" font-family="Cinzel" font-size="20" letter-spacing="5">CJR COUTURE</text></svg>'); background-repeat: repeat; z-index: 4; }

        .modal-info-side { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; background: var(--surface-color); }
        .close-modal-btn { position: absolute; top: -50px; right: 0; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; opacity: 0.6; transition: var(--transition-fast); }
        .close-modal-btn:hover { opacity: 1; transform: rotate(90deg); }
        @media (max-width: 900px) { .close-modal-btn { top: 15px; right: 15px; color: #000; background: rgba(255,255,255,0.8); width: 40px; height: 40px; border-radius: 50%; z-index: 10; } .modal-info-side { padding: 40px 30px; } }

        .modal-cat { color: var(--gold); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px; }
        .modal-title { font-family: var(--font-display); font-size: 2.2rem; color: var(--text-primary); letter-spacing: 2px; line-height: 1.2; margin-bottom: 25px; }
        .modal-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 2; margin-bottom: 40px; font-weight: 300; }
        .modal-price { font-size: 1.2rem; font-weight: 400; color: var(--text-primary); letter-spacing: 2px; margin-bottom: 40px; }
        
        .btn-outline { background: transparent; border: 1px solid var(--text-primary); color: var(--text-primary); padding: 18px; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 3px; cursor: pointer; transition: var(--transition-fast); width: 100%; display: flex; justify-content: center; align-items: center; gap: 12px; }
        .btn-outline:hover { background: var(--text-primary); color: #fff; }

        /* Sidebar Cart Panel */
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 1001; opacity: 0; pointer-events: none; transition: var(--transition-fast); }
        .cart-overlay.active { opacity: 1; pointer-events: auto; }
        
        .cart-sidebar { position: fixed; top: 0; right: -500px; width: 100%; max-width: 450px; height: 100vh; background: var(--bg-color); z-index: 1002; transition: var(--transition-slow); display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        
        .cart-header { padding: 40px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
        .cart-header h3 { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 4px; color: var(--text-primary); font-weight: 400; text-transform: uppercase; }
        .close-cart-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; transition: var(--transition-fast); color: var(--text-muted); }
        .close-cart-btn:hover { color: var(--text-primary); transform: rotate(90deg); }

        .cart-items { flex-grow: 1; overflow-y: auto; padding: 40px; }
        .cart-item { display: flex; gap: 20px; margin-bottom: 35px; }
        .cart-item-img-wrapper { width: 90px; height: 125px; position: relative; flex-shrink: 0; }
        .cart-item-img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item-info { display: flex; flex-direction: column; justify-content: center; }
        .cart-item-title { font-family: var(--font-display); font-size: 1rem; color: var(--text-primary); margin-bottom: 8px; }
        .cart-item-category { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .remove-btn { color: var(--text-muted); background: none; border: none; border-bottom: 1px solid transparent; cursor: pointer; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; align-self: flex-start; transition: var(--transition-fast); }
        .remove-btn:hover { color: #d9534f; border-bottom-color: #d9534f; }

        .cart-footer { padding: 40px; border-top: 1px solid var(--border-light); }
        .checkout-wa-btn { background: var(--text-primary); color: #fff; border: none; width: 100%; padding: 20px; font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: var(--transition-fast); display: flex; justify-content: center; align-items: center; gap: 12px; }
        .checkout-wa-btn:hover { background: var(--gold); }

        .empty-cart { text-align: center; color: var(--text-muted); font-size: 0.8rem; padding-top: 100px; letter-spacing: 1px; font-weight: 300; }
        
        #toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10000; pointer-events: none; }
        .toast { background: rgba(10,10,10,0.9); backdrop-filter: blur(5px); color: #fff; padding: 15px 40px; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; border-radius: 30px; animation: popUp 0.4s ease forwards; text-align: center; }
        @keyframes popUp { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        .hide { display: none !important; }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-side"></div>
        <div class="header-center">
            <a href="#" class="brand-logo">CJR</a>
            <div class="brand-subtitle">Couture</div>
        </div>
        <div class="header-side" style="text-align: right;">
            <button class="cart-icon-btn" onclick="toggleCart()">
                <i class="fa-solid fa-bag-shopping"></i>
                <span class="cart-badge" id="cart-count">0</span>
            </button>
        </div>
    </header>

    <div id="loader-panel">
        <div class="loader-logo">CJR</div>
        <div style="font-size: 0.6rem; letter-spacing: 5px; margin-top: 20px; color: var(--gold); text-transform: uppercase;">Preparing Collection</div>
    </div>

    <div id="toast-container"></div>

    <main class="container">
        
        <div class="section-header reveal">
            <h2>The Masterpiece</h2>
            <div class="divider"></div>
            <p>Exclusive Haute Couture Collection</p>
        </div>

        <div class="filter-container reveal" id="filter-wrapper">
            <button class="filter-btn active" onclick="filterCategory('all', event)">All Collection</button>
            <button class="filter-btn" onclick="filterCategory('cocktail dress', event)">Cocktail Dress</button>
            <button class="filter-btn" onclick="filterCategory('evening dress', event)">Evening Dress</button>
            <button class="filter-btn" onclick="filterCategory('engagement dress', event)">Engagement</button>
            <button class="filter-btn" onclick="filterCategory('brides robe', event)">Brides Robe</button>
            <button class="filter-btn" onclick="filterCategory('wedding gown', event)">Wedding Gown</button>
            <button class="filter-btn" onclick="filterCategory('moms gown', event)">Mom's Gown</button>
        </div>

        <div class="catalog-grid" id="catalog-wrapper"></div>
    </main>

    <div class="modal" id="product-modal" onclick="closeModal()">
        <div class="modal-wrapper" onclick="event.stopPropagation()">
            <button class="close-modal-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            
            <div class="modal-image-side">
                <div class="modal-watermark-overlay"></div>
                <div class="invisible-shield"></div>
                <img id="modal-img" src="" alt="Koleksi">
            </div>
            
            <div class="modal-info-side">
                <span class="modal-cat" id="modal-cat">Kategori</span>
                <h3 class="modal-title" id="modal-title">Nama Gaun</h3>
                <p class="modal-desc" id="modal-desc">Deskripsi gaun</p>
                <div class="modal-price" id="modal-price">Harga</div> 
                <button class="btn-outline" onclick="addToCartFromModal()">
                    Tambah ke Wishlist
                </button>
            </div>
        </div>
    </div>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Wishlist</h3>
            <button class="close-cart-btn" onclick="toggleCart()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <button class="checkout-wa-btn" onclick="checkoutWA()">
                Inquiry via WhatsApp
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <script>
        // Security
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) { if(e.keyCode==123 || (e.ctrlKey && e.shiftKey && (e.keyCode==73 || e.keyCode==74)) || (e.ctrlKey && e.keyCode==85) || (e.ctrlKey && e.keyCode==83)) return false; };

        const rawSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLAgyV7AjoFwARtvgnshPSZf2r9DWzpIzjRRoyUmodA6kg5ALfTLSqNOVDHwFwSqa12xkzUIefBaXO/pub?gid=0&single=true&output=csv";
        const whatsappNumber = "6282336975199"; 
        const placeholderImg = "https://placehold.co/600x900/f0f0f0/c59b27?text=CJR";

        let globalProductsData = [];
        let currentModalProductId = null;
        
        // Memori V3 agar clean dengan UI baru
        let cart = JSON.parse(localStorage.getItem('cjr_cart_v3')) || [];

        // Scroll animations
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (window.scrollY > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });

        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        // === SISTEM BYPASS GAMBAR GOOGLE DRIVE (FIX TERBARU) ===
        function parseImageUrl(url) {
            if (!url || url.trim() === "") return placeholderImg;
            let str = url.trim();
            // Mengekstrak ID Google Drive
            let match = str.match(/(?:\/d\/|id=)([\w-]+)/);
            if (match && match[1]) {
                // Menggunakan proxy lh3 yang tidak terblokir (Bypass Google Drive Policy)
                return `https://lh3.googleusercontent.com/d/${match[1]}`;
            }
            return str;
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            container.innerHTML = `<div class="toast">${msg}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 3000);
        }

        function fetchData() {
            fetch(rawSheetUrl + "&t=" + new Date().getTime())
                .then(res => res.text())
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: false, skipEmptyLines: true,
                        complete: function(results) {
                            if (results.data.length > 1) buildDatabase(results.data.slice(1));
                            else closeLoader();
                        }
                    });
                }).catch(err => closeLoader());
        }

        function buildDatabase(rows) {
            globalProductsData = rows.map((row, index) => {
                if (!row || !row[0]) return null;
                let status = (row[6] || '').toLowerCase();
                if (['kosong', 'sold', 'sembunyi'].includes(status)) return null;
                let hargaText = (row[4] || '').trim();
                return {
                    id: index,
                    nama: row[0].trim(),
                    kategori: (row[1] || 'Exclusive').trim(),
                    deskripsi: (row[2] || '-').trim(),
                    statusNew: (row[3] || '').trim().toLowerCase(),
                    harga: hargaText === '' ? 'Bespoke Inquiry' : hargaText,
                    gambar: parseImageUrl(row[5])
                };
            }).filter(item => item !== null);

            renderCatalog(globalProductsData);
            updateCartUI(); 
            closeLoader();
        }

        function createCardHTML(product) {
            const isNew = product.statusNew.includes('new') ? `<span class="badge-new">New</span>` : '';
            return `
                <div class="product-card reveal" onclick="openModal(${product.id})">
                    <div class="image-container">
                        ${isNew}
                        <div class="watermark">CJR</div>
                        <div class="invisible-shield"></div>
                        <img class="product-image" src="${product.gambar}" loading="lazy" onerror="this.src='${placeholderImg}';">
                    </div>
                    <div class="card-details">
                        <span class="product-category">${product.kategori}</span>
                        <h3 class="product-title">${product.nama}</h3>
                        <div class="product-price">${product.harga}</div>
                    </div>
                </div>
            `;
        }

        function renderCatalog(items) {
            const wrapper = document.getElementById('catalog-wrapper');
            wrapper.innerHTML = '';
            items.forEach(p => wrapper.innerHTML += createCardHTML(p));
            // Trigger animasinya
            setTimeout(() => { document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el)); }, 100);
        }

        function filterCategory(cat, event) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (event) event.target.classList.add('active');
            if (cat === 'all') renderCatalog(globalProductsData);
            else renderCatalog(globalProductsData.filter(p => p.kategori.toLowerCase().includes(cat.toLowerCase())));
        }

        function openModal(id) {
            const prod = globalProductsData.find(p => p.id === id);
            if(!prod) return;
            currentModalProductId = id;
            document.getElementById('modal-img').src = prod.gambar;
            document.getElementById('modal-cat').innerText = prod.kategori;
            document.getElementById('modal-title').innerText = prod.nama;
            document.getElementById('modal-desc').innerText = prod.deskripsi;
            document.getElementById('modal-price').innerText = prod.harga;
            document.getElementById('product-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('product-modal').classList.remove('active'); }
        function closeLoader() {
            const loader = document.getElementById('loader-panel');
            if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.classList.add('hide'), 800); }
        }
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            document.getElementById('cart-overlay').classList.toggle('active');
        }

        function addToCartFromModal() {
            const product = globalProductsData.find(p => p.id === currentModalProductId);
            if(!product) return;
            if(cart.find(item => item.id === product.id)) {
                showToast("Sudah ada di wishlist");
            } else {
                cart.push(product); saveCart(); closeModal(); toggleCart();
                const b = document.getElementById('cart-count');
                b.style.transform = 'scale(1.3)'; setTimeout(() => b.style.transform = 'scale(1)', 300);
            }
        }

        function removeFromCart(id) { cart = cart.filter(item => item.id !== id); saveCart(); }
        function saveCart() { localStorage.setItem('cjr_cart_v3', JSON.stringify(cart)); updateCartUI(); }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.length === 0 ? `<div class="empty-cart">Wishlist Anda kosong.</div>` : '';
            
            cart.forEach(item => {
                container.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-img-wrapper">
                            <div class="invisible-shield"></div>
                            <img src="${item.gambar}" class="cart-item-img" onerror="this.src='${placeholderImg}';">
                        </div>
                        <div class="cart-item-info">
                            <div class="cart-item-category">${item.kategori}</div>
                            <div class="cart-item-title">${item.nama}</div>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">Hapus</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('cart-count').innerText = cart.length; 
        }

        function checkoutWA() {
            if(cart.length === 0) return showToast("Wishlist kosong");
            let msg = `Bonjour tim *CJR Couture*.\n\nSaya tertarik dengan koleksi berikut:\n\n`;
            cart.forEach((item, i) => msg += `${i+1}. *${item.nama}*\n`);
            msg += `\nMohon info ketersediaan dan booking fitting. Terima kasih.`;
            window.open(`https://api.whatsapp.com/send?phone=${whatsappNumber}&text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = fetchData;
    </script>
</body>
