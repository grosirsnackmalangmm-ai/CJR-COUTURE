<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJR Couture | Haute Couture Catalog</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg-color: #080808;
            --surface-color: #121212;
            --surface-card: #151515;
            --text-primary: #ffffff;
            --text-muted: #888888;
            --gold: #d4af37; /* Emas yang lebih elegan */
            --font-display: 'Cinzel', serif;
            --font-body: 'Montserrat', sans-serif;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-primary); font-family: var(--font-body); line-height: 1.6; overflow-x: hidden; scroll-behavior: smooth; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

        /* Loader Ekstra Halus */
        #loader-panel { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease-out, visibility 0.8s ease-out; }
        .spinner { width: 45px; height: 45px; border: 1px solid rgba(212, 175, 55, 0.1); border-top: 1px solid var(--gold); border-radius: 50%; animation: spin 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg) scale(0.8); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(0.8); } }
        .loader-text { font-family: var(--font-display); letter-spacing: 5px; color: var(--gold); font-size: 0.75rem; text-transform: uppercase; opacity: 0.8; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* Header Mewah */
        header { background-color: rgba(8, 8, 8, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 20px 40px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(212, 175, 55, 0.1); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: var(--transition); }
        .header-left { width: 60px; } 
        .header-center { text-align: center; }
        .brand-logo { font-family: var(--font-display); font-size: 2.2rem; letter-spacing: 12px; color: var(--text-primary); text-decoration: none; display: block; margin-bottom: 2px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.2); transition: var(--transition); }
        .brand-logo:hover { text-shadow: 0 0 25px rgba(212, 175, 55, 0.5); }
        .brand-subtitle { font-size: 0.6rem; letter-spacing: 10px; color: var(--gold); text-transform: uppercase; font-weight: 400; opacity: 0.8; }
        .header-right { width: 60px; text-align: right; }
        
        /* Ikon Tas Belanja dengan Float Animation */
        .cart-icon-btn { background: none; border: none; color: var(--text-primary); font-size: 1.4rem; cursor: pointer; position: relative; transition: var(--transition); }
        .cart-icon-btn:hover { color: var(--gold); transform: translateY(-3px) scale(1.05); }
        .cart-badge { position: absolute; top: -8px; right: -12px; background: var(--gold); color: #000; font-size: 0.65rem; font-weight: bold; width: 20px; height: 20px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px rgba(212, 175, 55, 0.6); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px 80px; }
        
        /* Slider New Arrival */
        .new-arrival-section { padding: 60px 20px 40px; background: radial-gradient(ellipse at top, #151515 0%, #080808 100%); border-bottom: 1px solid rgba(212, 175, 55, 0.05); }
        .swiper { width: 100%; padding-bottom: 60px !important; }
        .swiper-slide { height: auto; transition: var(--transition); }
        .swiper-pagination-bullet { background: rgba(255,255,255,0.3) !important; transition: 0.4s; width: 10px; height: 10px; }
        .swiper-pagination-bullet-active { background: var(--gold) !important; transform: scale(1.5); box-shadow: 0 0 12px var(--gold); }

        /* Sistem Filter */
        .filter-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 60px; }
        .filter-btn { background: transparent; border: 1px solid rgba(255, 255, 255, 0.08); color: var(--text-muted); padding: 12px 28px; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: var(--transition); border-radius: 2px; position: relative; overflow: hidden; }
        .filter-btn::before { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent); transition: 0.5s; }
        .filter-btn:hover::before { left: 100%; }
        .filter-btn:hover, .filter-btn.active { color: var(--gold); border-color: var(--gold); background-color: rgba(212, 175, 55, 0.03); box-shadow: 0 0 20px rgba(212, 175, 55, 0.15); }

        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-family: var(--font-display); font-size: 2rem; letter-spacing: 10px; text-transform: uppercase; font-weight: 300; padding-bottom: 20px; display: inline-block; position: relative; color: #fff; }
        .section-header h2::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 1px; background-color: var(--gold); box-shadow: 0 0 15px var(--gold); }

        /* Kartu Produk Elegan dengan Animasi Masuk */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 50px 30px; }
        .product-card { background-color: var(--surface-card); border: 1px solid rgba(255, 255, 255, 0.02); display: flex; flex-direction: column; cursor: pointer; transition: var(--transition); position: relative; height: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.4); opacity: 0; animation: fadeInUp 0.8s forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .product-card:hover { transform: translateY(-12px); border-color: rgba(212, 175, 55, 0.3); box-shadow: 0 25px 50px rgba(0,0,0,0.9), 0 0 25px rgba(212, 175, 55, 0.15); z-index: 2; }
        
        /* Modern Aspect Ratio & Anti-Gepeng */
        .image-container { position: relative; width: 100%; aspect-ratio: 3/4; background-color: #050505; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .product-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1); opacity: 0.9; }
        .product-card:hover .product-image { transform: scale(1.1); opacity: 1; filter: contrast(1.1) brightness(1.1); }
        
        /* === WATERMARK SISTEM TERPUSAT === */
        .watermark-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); font-family: var(--font-display); font-size: 4rem; font-weight: 700; color: rgba(255, 255, 255, 0.1); letter-spacing: 15px; z-index: 5; pointer-events: none; mix-blend-mode: overlay; user-select: none; white-space: nowrap; transition: var(--transition); }
        .product-card:hover .watermark-center { transform: translate(-50%, -50%) rotate(-15deg) scale(1.1); color: rgba(212, 175, 55, 0.15); }
        
        .badge-new { position: absolute; top: 15px; left: 15px; background-color: var(--gold); color: #000; font-size: 0.55rem; font-weight: 700; text-transform: uppercase; padding: 6px 14px; letter-spacing: 3px; z-index: 6; box-shadow: 0 5px 15px rgba(0,0,0,0.6); }

        .card-details { padding: 30px 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; background: linear-gradient(0deg, #0a0a0a 0%, #151515 100%); position: relative; z-index: 2; }
        .product-category { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 15px; opacity: 0.9; }
        .product-title { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 18px; color: #fff; letter-spacing: 1.5px; }
        .product-price { font-size: 0.85rem; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 18px; color: var(--text-muted); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }

        /* Modal Pop-up (Border Emas & Anti-Gepeng Sempurna) */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: var(--transition); padding: 20px; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-wrapper { background-color: var(--surface-color); border: 1px solid rgba(212, 175, 55, 0.2); max-width: 1000px; width: 100%; display: flex; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.9); transform: scale(0.95) translateY(20px); opacity: 0; transition: var(--transition); }
        .modal.active .modal-wrapper { transform: scale(1) translateY(0); opacity: 1; }
        
        @media (max-width: 768px) { .modal-wrapper { flex-direction: column; } .modal-image-side { min-height: 50vh; } }
        
        .modal-image-side { flex: 1.2; background-color: #030303; position: relative; display: flex; justify-content: center; align-items: center; padding: 0; overflow: hidden; }
        .modal-image-side::after { content: ''; position: absolute; inset: 0; box-shadow: inset 0 0 50px rgba(0,0,0,1); pointer-events: none; z-index: 2; }
        .modal-image-side img { width: 100%; height: 100%; max-height: 85vh; object-fit: contain; background: transparent; position: relative; z-index: 1; }
        
        /* Watermark di dalam Modal */
        .modal .watermark-center { font-size: 5rem; z-index: 3; color: rgba(255,255,255,0.08); }

        .modal-info-side { flex: 1; padding: 60px 40px; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(135deg, #111 0%, #050505 100%); }
        .close-modal-btn { position: absolute; top: 20px; right: 25px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 1.2rem; cursor: pointer; z-index: 10; transition: 0.4s; backdrop-filter: blur(5px); }
        .close-modal-btn:hover { color: var(--gold); border-color: var(--gold); transform: rotate(90deg); background: rgba(212, 175, 55, 0.1); }
        
        .modal-cat { color: var(--gold); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 15px; display: block; }
        .modal-title { font-family: var(--font-display); font-size: 2.2rem; margin-bottom: 25px; color: #fff; letter-spacing: 2px; line-height: 1.2; }
        .modal-desc { font-size: 0.9rem; color: #aaa; margin-bottom: 50px; line-height: 1.9; font-weight: 300; }
        
        .btn-gold { background-color: var(--gold); color: #000; border: 1px solid var(--gold); padding: 18px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 3px; font-weight: 600; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: var(--transition); width: 100%; position: relative; overflow: hidden; }
        .btn-gold::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: rgba(255,255,255,0.2); transform: rotate(45deg) translateY(-100%); transition: 0.6s; }
        .btn-gold:hover::after { transform: rotate(45deg) translateY(100%); }
        .btn-gold:hover { background-color: #000; color: var(--gold); box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }

        /* Sidebar Tas Belanja / Wishlist */
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); z-index: 1001; opacity: 0; pointer-events: none; transition: var(--transition); }
        .cart-overlay.active { opacity: 1; pointer-events: auto; }
        
        .cart-sidebar { position: fixed; top: 0; right: -500px; width: 100%; max-width: 450px; height: 100vh; background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px); z-index: 1002; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; border-left: 1px solid rgba(212, 175, 55, 0.15); box-shadow: -15px 0 40px rgba(0,0,0,0.8); }
        .cart-sidebar.open { right: 0; }
        
        .cart-header { padding: 35px 30px; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; background: #080808; }
        .cart-header h3 { font-family: var(--font-display); font-size: 1.3rem; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; }
        .close-cart-btn { background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .close-cart-btn:hover { color: var(--gold); opacity: 1; transform: rotate(90deg); }

        .cart-items { flex-grow: 1; overflow-y: auto; padding: 30px; }
        .cart-item { display: flex; gap: 20px; margin-bottom: 30px; padding-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.03); animation: fadeInUp 0.5s ease forwards; }
        
        .cart-item-img-wrapper { position: relative; width: 85px; height: 115px; border: 1px solid rgba(212, 175, 55, 0.2); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .cart-item-img { width: 100%; height: 100%; object-fit: cover; }
        .cart-watermark { position: absolute; font-family: var(--font-display); color: rgba(255,255,255,0.2); font-size: 1.5rem; font-weight: bold; transform: rotate(-15deg); mix-blend-mode: overlay; pointer-events: none; }
        
        .cart-item-info { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 5px 0; }
        .cart-item-title { font-family: var(--font-display); font-size: 1.1rem; color: #fff; letter-spacing: 1px; margin-bottom: 8px; }
        .cart-item-category { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
        
        .cart-item-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .exclusive-badge { font-size: 0.6rem; color: var(--gold); border: 1px solid rgba(212, 175, 55, 0.4); padding: 4px 10px; border-radius: 2px; text-transform: uppercase; letter-spacing: 2px; background: rgba(212, 175, 55, 0.05); }
        .remove-btn { color: #777; background: none; border: none; cursor: pointer; font-size: 0.8rem; transition: 0.3s; display: flex; align-items: center; gap: 6px; letter-spacing: 1px; text-transform: uppercase; }
        .remove-btn:hover { color: #ff4d4d; }

        .cart-footer { padding: 35px 30px; border-top: 1px solid rgba(255,255,255,0.03); background: #050505; }
        
        /* Tombol Integrasi WhatsApp Profesional & Simpel */
        .checkout-wa-btn { background: #151515; color: var(--gold); border: 1px solid var(--gold); width: 100%; padding: 20px; font-family: var(--font-body); font-weight: 500; font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 15px; transition: var(--transition); border-radius: 2px; }
        .checkout-wa-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 25px rgba(212, 175, 55, 0.3); transform: translateY(-3px); }

        .empty-cart { text-align: center; color: #555; font-size: 0.9rem; padding-top: 100px; letter-spacing: 1.5px; }
        .empty-cart i { font-size: 3.5rem; color: rgba(212, 175, 55, 0.1); margin-bottom: 25px; display: block; animation: float 4s ease-in-out infinite; }

        .hide { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="header-left"></div>
        <div class="header-center">
            <a href="#" class="brand-logo">CJR</a>
            <div class="brand-subtitle">Couture</div>
        </div>
        <div class="header-right">
            <button class="cart-icon-btn" onclick="toggleCart()">
                <i class="fa-solid fa-bag-shopping"></i>
                <span class="cart-badge" id="cart-count">0</span>
            </button>
        </div>
    </header>

    <div id="loader-panel">
        <div class="spinner"></div>
        <div class="loader-text">Curating Masterpieces...</div>
    </div>

    <section class="new-arrival-section hide" id="new-arrival-section">
        <div class="section-header" style="margin-bottom: 40px;">
            <h2>New Arrival</h2>
        </div>
        <div style="max-width: 1400px; margin: 0 auto;">
            <div class="swiper newArrivalSwiper">
                <div class="swiper-wrapper" id="new-arrival-wrapper"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </section>

    <main class="container" style="padding-top: 40px;">
        <div class="filter-container" id="filter-wrapper">
            <button class="filter-btn active" onclick="filterCategory('all')">All Collection</button>
            <button class="filter-btn" onclick="filterCategory('cocktail dress')">Cocktail Dress</button>
            <button class="filter-btn" onclick="filterCategory('evening dress')">Evening Dress</button>
            <button class="filter-btn" onclick="filterCategory('engagement dress')">Engagement Dress</button>
            <button class="filter-btn" onclick="filterCategory('brides robe')">Brides Robe</button>
            <button class="filter-btn" onclick="filterCategory('wedding gown')">Wedding Gown</button>
            <button class="filter-btn" onclick="filterCategory('moms gown')">Mom's Gown</button>
        </div>

        <div class="section-header">
            <h2>The Collection</h2>
        </div>

        <div class="catalog-grid" id="catalog-wrapper"></div>
    </main>

    <div class="modal" id="product-modal" onclick="closeModal(event)">
        <div class="modal-wrapper" onclick="event.stopPropagation()">
            <button class="close-modal-btn" onclick="closeModal(null)"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-image-side">
                <div class="watermark-center">CJR COUTURE</div>
                <img id="modal-img" src="" alt="Koleksi Gambar">
            </div>
            <div class="modal-info-side">
                <span class="modal-cat" id="modal-cat">Kategori</span>
                <h3 class="modal-title" id="modal-title">Nama Gaun</h3>
                <p class="modal-desc" id="modal-desc">Deskripsi gaun</p>
                <button id="modal-add-btn" class="btn-gold" onclick="addToCartFromModal()">
                    <i class="fa-solid fa-plus"></i> Tambah ke Wishlist
                </button>
            </div>
        </div>
    </div>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3><i class="fa-regular fa-heart"></i> My Wishlist</h3>
            <button class="close-cart-btn" onclick="toggleCart()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <button class="checkout-wa-btn" onclick="checkoutWA()">
                <i class="fa-brands fa-whatsapp" style="font-size: 1.4rem;"></i> Hubungi CJR Couture
            </button>
            <p style="font-size: 0.65rem; color: #666; text-align: center; margin-top: 20px; letter-spacing: 1px; line-height: 1.5;">
                Eksklusivitas terjamin. Mari berdiskusi lebih lanjut bersama tim spesialis kami.
            </p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // === PENGATURAN ===
        const rawSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLAgyV7AjoFwARtvgnshPSZf2r9DWzpIzjRRoyUmodA6kg5ALfTLSqNOVDHwFwSqa12xkzUIefBaXO/pub?gid=0&single=true&output=csv";
        const whatsappNumber = "6282336975199"; 
        const placeholderImg = "https://placehold.co/600x800/121212/c5a059?text=CJR+Couture";

        let globalProductsData = [];
        let currentModalProductId = null;
        let cart = JSON.parse(localStorage.getItem('cjr_cart')) || [];

        updateCartUI();

        // Bypass Google Drive Thumbnail
        function parseImageUrl(url) {
            if (!url || url.trim() === "") return placeholderImg;
            let str = url.trim();
            let id = "";
            if (str.includes("drive.google.com/file/d/")) {
                let match = str.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) id = match[1];
            } else if (str.includes("drive.google.com/open?id=")) {
                id = str.split("id=")[1].split("&")[0];
            }
            if (id) return `https://lh3.googleusercontent.com/d/${id}=s1000`;
            return str;
        }

        // Fetch Data Excel
        function fetchData() {
            fetch(rawSheetUrl)
                .then(res => res.text())
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: false,
                        skipEmptyLines: true,
                        complete: function(results) {
                            const rows = results.data;
                            if (rows.length > 1) {
                                buildDatabase(rows.slice(1));
                            } else {
                                closeLoader();
                            }
                        }
                    });
                })
                .catch(err => closeLoader());
        }

        function buildDatabase(rows) {
            globalProductsData = rows.map((row, index) => {
                const nama = row[0] ? row[0].trim() : '';
                
                // Hide jika kolom G kosong
                const statusTampil = row[6] ? row[6].trim() : '';
                if (!nama || statusTampil === '') return null;

                return {
                    id: index,
                    nama: nama,
                    kategori: row[1] ? row[1].trim() : 'Exclusive',
                    deskripsi: row[2] ? row[2].trim() : '-',
                    statusNew: row[3] ? row[3].trim().toLowerCase() : '',
                    gambar: parseImageUrl(row[5])
                };
            }).filter(item => item !== null);

            renderNewArrivals();
            renderCatalog(globalProductsData);
            closeLoader();
        }

        // Generate Item Card HTML (Dengan Watermark & Stagger Animation)
        function createCardHTML(product, index = 0) {
            const isNew = product.statusNew.includes('new') ? `<span class="badge-new">New Arrival</span>` : '';
            // Memberikan jeda animasi untuk efek pemunculan yang elegan
            const animDelay = (index % 10) * 0.1; 
            
            return `
                <div class="product-card" onclick="openModal(${product.id})" style="animation-delay: ${animDelay}s;">
                    <div class="image-container">
                        ${isNew}
                        <div class="watermark-center">CJR</div> 
                        <img class="product-image" src="${product.gambar}" alt="${product.nama}" onerror="this.onerror=null; this.src='${placeholderImg}';">
                    </div>
                    <div class="card-details">
                        <span class="product-category">${product.kategori}</span>
                        <h3 class="product-title">${product.nama}</h3>
                        <div class="product-price">Bespoke Inquiry</div>
                    </div>
                </div>
            `;
        }

        function renderNewArrivals() {
            const newArrivals = globalProductsData.filter(p => p.statusNew.includes('new'));
            const section = document.getElementById('new-arrival-section');
            const wrapper = document.getElementById('new-arrival-wrapper');
            wrapper.innerHTML = '';

            if(newArrivals.length > 0) {
                section.classList.remove('hide');
                newArrivals.forEach((product, idx) => {
                    wrapper.innerHTML += `<div class="swiper-slide">${createCardHTML(product, idx)}</div>`;
                });

                new Swiper(".newArrivalSwiper", {
                    slidesPerView: 1,
                    spaceBetween: 30,
                    autoplay: { delay: 4500, disableOnInteraction: false },
                    pagination: { el: ".swiper-pagination", clickable: true },
                    breakpoints: {
                        600: { slidesPerView: 2 },
                        950: { slidesPerView: 3 },
                        1300: { slidesPerView: 4 }
                    }
                });
            } else {
                section.classList.add('hide');
            }
        }

        function renderCatalog(items) {
            const wrapper = document.getElementById('catalog-wrapper');
            wrapper.innerHTML = '';
            items.forEach((product, idx) => {
                wrapper.innerHTML += createCardHTML(product, idx);
            });
        }

        function filterCategory(cat) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (event) event.target.classList.add('active');
            
            if (cat === 'all') {
                renderCatalog(globalProductsData);
            } else {
                const filtered = globalProductsData.filter(p => {
                    let pCat = p.kategori.toLowerCase().replace(/['"’]/g, '');
                    let targetCat = cat.toLowerCase().replace(/['"’]/g, '');
                    return pCat.includes(targetCat);
                });
                renderCatalog(filtered);
            }
        }

        function openModal(id) {
            const prod = globalProductsData.find(p => p.id === id);
            if(!prod) return;
            currentModalProductId = id;

            const modalImg = document.getElementById('modal-img');
            modalImg.src = prod.gambar;
            modalImg.onerror = function() { this.onerror=null; this.src=placeholderImg; };

            document.getElementById('modal-cat').innerText = prod.kategori;
            document.getElementById('modal-title').innerText = prod.nama;
            document.getElementById('modal-desc').innerText = prod.deskripsi;

            document.getElementById('product-modal').classList.add('active');
            document.body.style.overflow = 'hidden'; // Mencegah scroll di background
        }

        function closeModal(e) {
            document.getElementById('product-modal').classList.remove('active');
            document.body.style.overflow = 'auto'; // Mengembalikan scroll
        }

        function closeLoader() {
            const loader = document.getElementById('loader-panel');
            if(loader) {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                setTimeout(() => loader.remove(), 800);
            }
        }

        // === SISTEM WISHLIST & WA PROFESIONAL ===
        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('cart-overlay');
            
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
            
            if (sidebar.classList.contains('open')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }

        function addToCartFromModal() {
            if(currentModalProductId === null) return;
            const product = globalProductsData.find(p => p.id === currentModalProductId);
            if(!product) return;

            const itemAda = cart.find(item => item.id === product.id);
            if(itemAda) {
                alert("Koleksi ini sudah ada di dalam daftar Wishlist Anda.");
            } else {
                cart.push({ ...product });
                saveCart();
                closeModal(null);
                toggleCart();
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
        }

        function saveCart() {
            localStorage.setItem('cjr_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const containerItem = document.getElementById('cart-items');
            const penandaJumlah = document.getElementById('cart-count');
            
            containerItem.innerHTML = '';

            if(cart.length === 0) {
                containerItem.innerHTML = `
                    <div class="empty-cart">
                        <i class="fa-regular fa-heart"></i>
                        <p>Daftar koleksi impian Anda masih kosong.</p>
                    </div>
                `;
            } else {
                cart.forEach((item, index) => {
                    const animDelay = index * 0.1;
                    containerItem.innerHTML += `
                        <div class="cart-item" style="animation-delay: ${animDelay}s;">
                            <div class="cart-item-img-wrapper">
                                <span class="cart-watermark">CJR</span>
                                <img src="${item.gambar}" class="cart-item-img" onerror="this.onerror=null; this.src='${placeholderImg}';">
                            </div>
                            <div class="cart-item-info">
                                <div>
                                    <div class="cart-item-title">${item.nama}</div>
                                    <div class="cart-item-category">${item.kategori}</div>
                                </div>
                                <div class="cart-item-actions">
                                    <span class="exclusive-badge">Available</span>
                                    <button class="remove-btn" onclick="removeFromCart(${item.id})"><i class="fa-solid fa-xmark"></i> Remove</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            penandaJumlah.innerText = cart.length; 
        }

        // === FORMAT PESAN WA PROFESIONAL & SIMPEL ===
        function checkoutWA() {
            if(cart.length === 0) {
                alert("Daftar koleksi Anda masih kosong.");
                return;
            }

            // Teks yang elegan, langsung pada intinya, tanpa kerumitan total atau fitting
            let isiPesan = `Halo tim CJR Couture,\n\nSaya ingin menanyakan informasi dan ketersediaan untuk koleksi berikut:\n\n`;
            
            cart.forEach((item, index) => {
                isiPesan += `${index + 1}. *${item.nama}* — ${item.kategori}\n`;
            });

            isiPesan += `\nMohon detail informasinya. Terima kasih.`;

            const linkWhatsApp = `https://api.whatsapp.com/send?phone=${whatsappNumber}&text=${encodeURIComponent(isiPesan)}`;
            window.open(linkWhatsApp, '_blank');
        }

        window.onload = fetchData;
    </script>
</body>
</html>
