<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJR Couture | Haute Couture Catalog</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* === LUXURY COUTURE PALETTE & TRANSITIONS === */
        :root {
            --bg-color: #ffffff;
            --surface-color: #fafafa;
            --surface-card: #ffffff;
            --text-primary: #111111;
            --text-muted: #666666;
            --gold: #c59b27;
            --gold-light: #fdfaf3;
            --gold-dark: #99741d;
            --font-display: 'Cinzel', serif;
            --font-body: 'Montserrat', sans-serif;
            --shadow-sm: 0 5px 20px rgba(0,0,0,0.03);
            --shadow-md: 0 20px 40px rgba(0,0,0,0.08);
            --shadow-lg: 0 30px 60px rgba(0,0,0,0.15);
            --transition: all 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            --transition-fast: all 0.4s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; -ms-user-select: none; user-select: none; }
        input, textarea { -webkit-user-select: text; user-select: text; }

        body { background-color: var(--bg-color); color: var(--text-primary); font-family: var(--font-body); line-height: 1.6; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--surface-color); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        #loader-panel { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease, visibility 0.8s; }
        .spinner { width: 50px; height: 50px; border: 2px solid rgba(197, 155, 39, 0.1); border-top: 2px solid var(--gold); border-radius: 50%; animation: spin 1s cubic-bezier(0.55, 0.055, 0.675, 0.19) infinite; margin-bottom: 25px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { font-family: var(--font-display); letter-spacing: 6px; color: var(--gold); font-size: 0.8rem; text-transform: uppercase; font-weight: 500; }

        header { background-color: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 25px 40px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(0, 0, 0, 0.02); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-sm); transition: var(--transition); }
        header.scrolled { padding: 15px 40px; background-color: rgba(255, 255, 255, 0.98); box-shadow: var(--shadow-sm); }
        .header-left, .header-right { width: 80px; } 
        .header-center { text-align: center; }
        .brand-logo { font-family: var(--font-display); font-size: 2.6rem; letter-spacing: 18px; color: var(--text-primary); text-decoration: none; display: block; font-weight: 500; text-indent: 18px; line-height: 1; transition: var(--transition); }
        .brand-subtitle { font-size: 0.65rem; letter-spacing: 12px; color: var(--gold); text-transform: uppercase; font-weight: 500; text-indent: 12px; margin-top: 8px; transition: var(--transition); }
        .header-right { text-align: right; }
        
        .cart-icon-btn { background: none; border: none; color: var(--text-primary); font-size: 1.4rem; cursor: pointer; position: relative; transition: var(--transition-fast); padding: 5px; }
        .cart-icon-btn:hover { color: var(--gold); transform: scale(1.05); }
        .cart-badge { position: absolute; top: -2px; right: -6px; background: var(--gold); color: #fff; font-size: 0.6rem; font-weight: 600; width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 3px 8px rgba(197, 155, 39, 0.4); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .cart-badge.bump { transform: scale(1.4); }

        .container { max-width: 1440px; margin: 0 auto; padding: 50px 40px 80px; }
        @media (max-width: 768px) { .container { padding: 30px 15px 60px; } header { padding: 15px 15px; } .brand-logo { font-size: 1.8rem; letter-spacing: 12px; text-indent: 12px; } }
        
        .new-arrival-section { padding: 60px 40px 30px; background: #fafafa; border-bottom: 1px solid rgba(0, 0, 0, 0.02); }
        .swiper { width: 100%; padding-bottom: 60px !important; }
        .swiper-pagination-bullet { background: #ccc !important; opacity: 0.5; transition: var(--transition-fast); width: 6px; height: 6px; }
        .swiper-pagination-bullet-active { background: var(--gold) !important; opacity: 1; width: 30px; border-radius: 4px; }

        .filter-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin-bottom: 60px; }
        .filter-btn { background: transparent; border: 1px solid #eaeaea; color: var(--text-muted); padding: 12px 28px; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: var(--transition-fast); border-radius: 2px; font-weight: 500; font-family: var(--font-body); }
        .filter-btn:hover, .filter-btn.active { color: var(--gold); border-color: var(--gold); background-color: var(--gold-light); }

        .section-header { text-align: center; margin-bottom: 50px; }
        .section-header h2 { font-family: var(--font-display); font-size: 2rem; letter-spacing: 8px; text-transform: uppercase; font-weight: 400; padding-bottom: 15px; display: inline-block; position: relative; color: var(--text-primary); }
        .section-header h2::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 50px; height: 1px; background-color: var(--gold); }

        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 50px 30px; transition: opacity 0.6s ease; }
        .product-card { background-color: var(--surface-card); display: flex; flex-direction: column; cursor: pointer; transition: var(--transition); position: relative; height: 100%; overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid transparent; }
        .product-card:hover { transform: translateY(-12px); box-shadow: var(--shadow-md); border-color: rgba(197, 155, 39, 0.15); }
        
        .image-container { position: relative; width: 100%; padding-top: 145%; background-color: #f7f7f7; overflow: hidden; }
        .product-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; -webkit-user-drag: none; user-drag: none; }
        .product-card:hover .product-image { transform: scale(1.08); }
        .invisible-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; background: transparent; }
        
        /* Quick Wishlist Button di Katalog */
        .quick-wishlist-btn { position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(4px); border: none; width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--text-primary); font-size: 1.1rem; cursor: pointer; z-index: 10; box-shadow: var(--shadow-sm); transition: var(--transition-fast); }
        .quick-wishlist-btn:hover { color: var(--gold); background: #fff; transform: scale(1.1); box-shadow: 0 5px 15px rgba(197, 155, 39, 0.3); }

        /* WATERMARK HANYA TULISAN CJR TRANSPARAN */
        .watermark-bottom { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); font-family: var(--font-display); font-size: 1.6rem; font-weight: 400; color: rgba(255, 255, 255, 0.35); letter-spacing: 12px; z-index: 4; pointer-events: none; text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.15); width: 100%; text-align: center; text-indent: 12px; }

        .badge-new { position: absolute; top: 20px; left: 20px; background-color: var(--gold); color: #fff; font-size: 0.6rem; font-weight: 600; text-transform: uppercase; padding: 6px 14px; letter-spacing: 2px; z-index: 4; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 2px; }

        .card-details { padding: 25px 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; background: #fff; border: 1px solid #f7f7f7; border-top: none; }
        .product-category { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px; font-weight: 600; }
        .product-title { font-family: var(--font-display); font-size: 1.15rem; margin-bottom: 15px; color: var(--text-primary); letter-spacing: 1px; font-weight: 500; line-height: 1.4; }
        .product-price { font-size: 0.9rem; margin-top: auto; border-top: 1px solid #fbfbfb; padding-top: 18px; color: var(--text-muted); font-weight: 500; letter-spacing: 1px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: var(--transition); padding: 20px; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-wrapper { background-color: #fff; max-width: 1000px; width: 100%; display: flex; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); transform: translateY(30px) scale(0.98); transition: var(--transition); border-radius: 2px; overflow: hidden; opacity: 0; }
        .modal.active .modal-wrapper { transform: translateY(0) scale(1); opacity: 1; }
        @media (max-width: 768px) { .modal-wrapper { flex-direction: column; } .modal-image-side { min-height: 450px; } }
        
        .modal-image-side { flex: 1.1; background-color: #fcfcfc; position: relative; display: flex; justify-content: center; align-items: center; padding: 15px; border-right: 1px solid #f5f5f5; overflow: hidden; }
        .modal-image-side img { width: 100%; height: 100%; max-height: 650px; object-fit: contain; position: relative; z-index: 2; pointer-events: none; -webkit-user-drag: none; user-drag: none; }

        .modal-watermark-bottom { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-family: var(--font-display); font-size: 2.8rem; font-weight: 400; color: rgba(255, 255, 255, 0.3); letter-spacing: 18px; z-index: 5; pointer-events: none; text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.15); width: 100%; text-align: center; text-indent: 18px; }

        .modal-info-side { flex: 1; padding: 60px 50px; display: flex; flex-direction: column; justify-content: center; background: #ffffff; }
        @media (max-width: 500px) { .modal-info-side { padding: 40px 25px; } .modal-watermark-bottom { font-size: 2rem; letter-spacing: 12px; text-indent: 12px; } }
        
        .close-modal-btn { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #111; font-size: 1.6rem; cursor: pointer; z-index: 10; opacity: 0.4; transition: var(--transition-fast); width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; border-radius: 50%; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); box-shadow: var(--shadow-sm); }
        .close-modal-btn:hover { color: var(--gold); opacity: 1; transform: rotate(90deg); background: #fff; }
        
        .modal-cat { color: var(--gold); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 15px; font-weight: 600; }
        .modal-title { font-family: var(--font-display); font-size: 2.2rem; margin-bottom: 20px; color: var(--text-primary); letter-spacing: 1px; font-weight: 500; line-height: 1.2; }
        .modal-desc { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 35px; line-height: 1.8; }
        .modal-price { font-size: 1.4rem; font-weight: 500; margin-bottom: 40px; color: var(--gold-dark); letter-spacing: 1px; border-bottom: 1px solid #f0f0f0; padding-bottom: 25px; }
        
        .btn-gold { background-color: var(--text-primary); color: #fff; border: 1px solid var(--text-primary); padding: 18px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 3px; font-weight: 500; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: var(--transition-fast); width: 100%; border-radius: 2px; }
        .btn-gold:hover { background-color: var(--gold); border-color: var(--gold); box-shadow: 0 10px 30px rgba(197, 155, 39, 0.25); transform: translateY(-3px); }

        /* Sidebar Wishlist */
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); z-index: 1001; opacity: 0; pointer-events: none; transition: var(--transition); }
        .cart-overlay.active { opacity: 1; pointer-events: auto; }
        
        .cart-sidebar { position: fixed; top: 0; right: -480px; width: 100%; max-width: 450px; height: 100vh; background: #ffffff; z-index: 1002; transition: var(--transition); display: flex; flex-direction: column; box-shadow: var(--shadow-lg); }
        .cart-sidebar.open { right: 0; }
        
        .cart-header { padding: 35px 30px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
        .cart-header h3 { font-family: var(--font-display); font-size: 1.2rem; letter-spacing: 3px; color: var(--text-primary); font-weight: 500; text-transform: uppercase; }
        .close-cart-btn { background: none; border: none; color: #222; font-size: 1.4rem; cursor: pointer; opacity: 0.4; transition: var(--transition-fast); }
        .close-cart-btn:hover { color: var(--gold); opacity: 1; transform: rotate(90deg); }

        .cart-items { flex-grow: 1; overflow-y: auto; padding: 30px; }
        .cart-item { display: flex; gap: 20px; margin-bottom: 30px; padding-bottom: 30px; border-bottom: 1px solid #f5f5f5; animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .cart-item-img-wrapper { width: 85px; height: 120px; position: relative; background: #fafafa; border-radius: 2px; overflow: hidden; flex-shrink: 0; border: 1px solid #eee; }
        .cart-item-img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .cart-item-info { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .cart-item-title { font-family: var(--font-display); font-size: 1rem; color: var(--text-primary); font-weight: 600; line-height: 1.4; margin-bottom: 5px; }
        .cart-item-category { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
        
        .cart-item-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .exclusive-badge { font-size: 0.6rem; color: var(--gold); border: 1px solid rgba(197, 155, 39, 0.25); padding: 4px 10px; text-transform: uppercase; letter-spacing: 1px; background: var(--gold-light); font-weight: 500; }
        .remove-btn { color: #aaa; background: none; border: none; cursor: pointer; font-size: 0.75rem; transition: var(--transition-fast); display: flex; align-items: center; gap: 5px; font-family: var(--font-body); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
        .remove-btn:hover { color: #d9534f; }

        .cart-footer { padding: 35px 30px; border-top: 1px solid #f0f0f0; background: #fafafa; }
        .checkout-wa-btn { background: #25D366; color: #fff; border: none; width: 100%; padding: 22px; font-family: var(--font-body); font-weight: 600; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 12px; transition: var(--transition-fast); box-shadow: 0 5px 15px rgba(37, 211, 102, 0.2); border-radius: 4px; }
        .checkout-wa-btn:hover { background: #1ebe57; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(37, 211, 102, 0.3); }

        .empty-cart { text-align: center; color: #aaa; font-size: 0.85rem; padding-top: 100px; letter-spacing: 1px; font-weight: 400; line-height: 1.8; }
        .empty-cart i { font-size: 3rem; color: #e0e0e0; margin-bottom: 25px; display: block; }

        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { background: #111; color: #fff; padding: 18px 30px; font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500; display: flex; align-items: center; gap: 15px; box-shadow: var(--shadow-lg); animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; pointer-events: auto; border-radius: 4px; border-left: 3px solid var(--gold); }
        .toast i { color: var(--gold); font-size: 1.1rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { to { transform: translateX(100%); opacity: 0; } }

        #backToTop { position: fixed; bottom: 30px; left: 30px; background-color: #fff; color: var(--text-primary); border: 1px solid #eee; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; cursor: pointer; z-index: 999; opacity: 0; pointer-events: none; transition: var(--transition-fast); box-shadow: var(--shadow-sm); }
        #backToTop.show { opacity: 1; pointer-events: auto; }
        #backToTop:hover { border-color: var(--gold); color: #fff; background-color: var(--gold); transform: translateY(-5px); box-shadow: var(--shadow-md); }

        .hide { display: none !important; opacity: 0 !important; visibility: hidden !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="Kembali ke atas">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <header id="main-header">
        <div class="header-left"></div>
        <div class="header-center">
            <a href="#" class="brand-logo">CJR</a>
            <div class="brand-subtitle">Couture</div>
        </div>
        <div class="header-right">
            <button class="cart-icon-btn" onclick="toggleCart()" aria-label="Buka Wishlist">
                <i class="fa-solid fa-bag-shopping"></i>
                <span class="cart-badge" id="cart-count">0</span>
            </button>
        </div>

    <div id="loader-panel">
        <div class="spinner"></div>
        <div class="loader-text">Loading Collection</div>
    </div>

    <div id="toast-container"></div>

    <section class="new-arrival-section hide" id="new-arrival-section">
        <div class="section-header" style="margin-bottom: 40px;">
            <h2>New Arrival</h2>
        </div>
        <div style="max-width: 1440px; margin: 0 auto;">
            <div class="swiper newArrivalSwiper">
                <div class="swiper-wrapper" id="new-arrival-wrapper"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </section>

    <main class="container">
        <div class="filter-container" id="filter-wrapper">
            <button class="filter-btn active" onclick="filterCategory('all', event)">All Collection</button>
            <button class="filter-btn" onclick="filterCategory('cocktail dress', event)">Cocktail Dress</button>
            <button class="filter-btn" onclick="filterCategory('evening dress', event)">Evening Dress</button>
            <button class="filter-btn" onclick="filterCategory('engagement dress', event)">Engagement Dress</button>
            <button class="filter-btn" onclick="filterCategory('brides robe', event)">Brides Robe</button>
            <button class="filter-btn" onclick="filterCategory('wedding gown', event)">Wedding Gown</button>
            <button class="filter-btn" onclick="filterCategory('moms gown', event)">Mom's Gown</button>
        </div>

        <div class="section-header">
            <h2>The Masterpiece</h2>
        </div>

        <div class="catalog-grid" id="catalog-wrapper"></div>
    </main>

    <div class="modal" id="product-modal" onclick="closeModal()">
        <div class="modal-wrapper" onclick="event.stopPropagation()">
            <button class="close-modal-btn" onclick="closeModal()" aria-label="Tutup"><i class="fa-solid fa-xmark"></i></button>
            
            <div class="modal-image-side">
                <div class="invisible-shield"></div>
                <div class="modal-watermark-bottom">CJR</div>
                <img id="modal-img" src="" alt="Koleksi Gambar" ondragstart="return false;">
            </div>
            
            <div class="modal-info-side">
                <span class="modal-cat" id="modal-cat">Kategori</span>
                <h3 class="modal-title" id="modal-title">Nama Gaun</h3>
                <p class="modal-desc" id="modal-desc">Deskripsi gaun</p>
                <div class="modal-price" id="modal-price">Harga</div> 
                <button id="modal-add-btn" class="btn-gold" onclick="addToCartFromModal()">
                    <i class="fa-regular fa-heart"></i> Tambah ke Wishlist
                </button>
            </div>
        </div>
    </div>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3><i class="fa-regular fa-heart" style="color: var(--gold);"></i> My Wishlist</h3>
            <button class="close-cart-btn" onclick="toggleCart()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <button class="checkout-wa-btn" onclick="checkoutWA()">
                <i class="fa-brands fa-whatsapp" style="font-size: 1.4rem;"></i> Pesan via WhatsApp
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) return false;
            if (e.ctrlKey && e.keyCode == 85) return false;
            if (e.ctrlKey && e.keyCode == 83) return false;
        };

        const rawSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLAgyV7AjoFwARtvgnshPSZf2r9DWzpIzjRRoyUmodA6kg5ALfTLSqNOVDHwFwSqa12xkzUIefBaXO/pub?gid=0&single=true&output=csv";
        const whatsappNumber = "6282336975199"; 
        const placeholderImg = "https://placehold.co/600x800/f5f5f5/c59b27?text=CJR+Couture";

        let globalProductsData = [];
        let currentModalProductId = null;
        
        // Memakai Cache v6 agar benar-benar mereset bug dari file sebelumnya
        let cart = JSON.parse(localStorage.getItem('cjr_cart_v6')) || [];

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            const header = document.getElementById('main-header');
            if (window.scrollY > 80) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
            if (window.scrollY > 300) btn.classList.add('show');
            else btn.classList.remove('show');
        });

        function parseImageUrl(url) {
            if (!url || url.trim() === "") return placeholderImg;
            let str = url.trim();
            let match = str.match(/(?:\/d\/|id=)([\w-]+)/);
            if (match && match[1]) {
                return "https://lh3.googleusercontent.com/d/" + match[1];
            }
            return str;
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fa-solid fa-gem"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                toast.addEventListener('animationend', () => toast.remove());
            }, 3500);
        }

        function fetchData() {
            const antiCacheUrl = rawSheetUrl + "&t=" + new Date().getTime();
            fetch(antiCacheUrl)
                .then(res => res.text())
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: false,
                        skipEmptyLines: true,
                        complete: function(results) {
                            if (results.data.length > 1) buildDatabase(results.data.slice(1));
                            else closeLoader();
                        }
                    });
                }).catch(err => closeLoader());
        }

        function buildDatabase(rows) {
            globalProductsData = rows.map((row, index) => {
                if (!row || row.length === 0 || !row[0]) return null;
                
                let statusSembunyi = '';
                if(row.length > 6 && row[6]) statusSembunyi = row[6].toString().trim().toLowerCase();
                if (['kosong', 'sold', 'sembunyi'].includes(statusSembunyi)) return null;

                let hargaText = row[4] ? row[4].trim() : '';
                if (hargaText === '' || hargaText.toLowerCase().includes('request')) hargaText = 'Bespoke Inquiry';

                return {
                    id: index,
                    nama: row[0].trim(),
                    kategori: row[1] ? row[1].trim() : 'Exclusive',
                    deskripsi: row[2] ? row[2].trim() : '-',
                    statusNew: row[3] ? row[3].trim().toLowerCase() : '',
                    harga: hargaText,
                    gambar: parseImageUrl(row[5])
                };
            }).filter(item => item !== null);

            renderNewArrivals();
            renderCatalog(globalProductsData);
            updateCartUI(); 
            closeLoader();
        }

        // FUNGSI BARU UNTUK KLIK WISHLIST LANGSUNG DARI KATALOG (TANPA BUKA MODAL)
        window.addDirectWishlist = function(event, id) {
            event.stopPropagation(); // Mencegah modal terbuka saat icon heart diklik
            const product = globalProductsData.find(p => p.id === id);
            if(!product) return;

            const itemAda = cart.find(item => item.id === product.id);
            if(itemAda) {
                showToast("Koleksi ini sudah ada di daftar Wishlist.");
            } else {
                cart.push(product);
                saveCart();
                showToast("Dimasukkan ke Wishlist!");
                
                const badge = document.getElementById('cart-count');
                badge.classList.add('bump');
                setTimeout(() => badge.classList.remove('bump'), 400);
            }
        };

        function createCardHTML(product) {
            const isNew = product.statusNew.includes('new') ? `<span class="badge-new">New Arrival</span>` : '';
            return `
                <div class="product-card" onclick="openModal(${product.id})">
                    <div class="image-container">
                        ${isNew}
                        <button class="quick-wishlist-btn" onclick="addDirectWishlist(event, ${product.id})" title="Tambah ke Wishlist">
                            <i class="fa-regular fa-heart"></i>
                        </button>
                        <div class="watermark-bottom">CJR</div>
                        <div class="invisible-shield"></div>
                        <img class="product-image" src="${product.gambar}" alt="${product.nama}" loading="lazy" onerror="this.onerror=null; this.src='${placeholderImg}';">
                    </div>
                    <div class="card-details">
                        <span class="product-category">${product.kategori}</span>
                        <h3 class="product-title">${product.nama}</h3>
                        <div class="product-price">${product.harga}</div>
                    </div>
                </div>
            `;
        }

        function renderNewArrivals() {
            const newArrivals = globalProductsData.filter(p => p.statusNew.includes('new'));
            const section = document.getElementById('new-arrival-section');
            const wrapper = document.getElementById('new-arrival-wrapper');
            wrapper.innerHTML = '';

            if(newArrivals.length > 0) {
                section.classList.remove('hide');
                newArrivals.forEach(p => wrapper.innerHTML += `<div class="swiper-slide">${createCardHTML(p)}</div>`);
                new Swiper(".newArrivalSwiper", {
                    slidesPerView: 1, spaceBetween: 30, autoplay: { delay: 4500, disableOnInteraction: false }, pagination: { el: ".swiper-pagination", clickable: true },
                    breakpoints: { 480: { slidesPerView: 2 }, 850: { slidesPerView: 3 }, 1200: { slidesPerView: 4 } }
                });
            } else { section.classList.add('hide'); }
        }

        function renderCatalog(items) {
            const wrapper = document.getElementById('catalog-wrapper');
            wrapper.style.opacity = '0';
            setTimeout(() => {
                wrapper.innerHTML = '';
                if(items.length === 0) {
                    wrapper.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #999; padding: 40px; font-size: 0.95rem; font-weight:300;">Koleksi tidak ditemukan.</div>`;
                    wrapper.style.opacity = '1';
                    return;
                }
                items.forEach(p => wrapper.innerHTML += createCardHTML(p));
                wrapper.style.opacity = '1';
            }, 400);
        }

        function filterCategory(cat, event) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (event) event.target.classList.add('active');
            
            if (cat === 'all') renderCatalog(globalProductsData);
            else renderCatalog(globalProductsData.filter(p => p.kategori.toLowerCase().includes(cat.toLowerCase())));
        }

        function openModal(id) {
            const prod = globalProductsData.find(p => p.id === id);
            if(!prod) return;
            currentModalProductId = id;

            document.getElementById('modal-img').src = prod.gambar;
            document.getElementById('modal-img').onerror = function() { this.onerror=null; this.src=placeholderImg; };
            
            document.getElementById('modal-cat').innerText = prod.kategori;
            document.getElementById('modal-title').innerText = prod.nama;
            document.getElementById('modal-desc').innerText = prod.deskripsi;
            document.getElementById('modal-price').innerText = prod.harga;
            document.getElementById('product-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('product-modal').classList.remove('active'); }
        function closeLoader() {
            const loader = document.getElementById('loader-panel');
            if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.classList.add('hide'), 800); }
        }
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            document.getElementById('cart-overlay').classList.toggle('active');
        }

        function addToCartFromModal() {
            if(currentModalProductId === null) return;
            const product = globalProductsData.find(p => p.id === currentModalProductId);
            if(!product) return;

            const itemAda = cart.find(item => item.id === product.id);
            if(itemAda) {
                showToast("Koleksi ini sudah ada di daftar Wishlist.");
            } else {
                cart.push(product);
                saveCart();
                closeModal();
                toggleCart();
                
                const badge = document.getElementById('cart-count');
                badge.classList.add('bump');
                setTimeout(() => badge.classList.remove('bump'), 400);
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
        }

        function saveCart() {
            localStorage.setItem('cjr_cart_v6', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const containerItem = document.getElementById('cart-items');
            const penandaJumlah = document.getElementById('cart-count');
            
            containerItem.innerHTML = '';

            if(cart.length === 0) {
                containerItem.innerHTML = `
                    <div class="empty-cart">
                        <i class="fa-regular fa-heart"></i>
                        <p>Daftar wishlist impian Anda masih kosong.</p>
                    </div>
                `;
            } else {
                cart.forEach((item) => {
                    containerItem.innerHTML += `
                        <div class="cart-item">
                            <div class="cart-item-img-wrapper">
                                <div class="invisible-shield"></div>
                                <img src="${item.gambar || placeholderImg}" class="cart-item-img" onerror="this.onerror=null; this.src='${placeholderImg}';">
                            </div>
                            <div class="cart-item-info">
                                <div>
                                    <div class="cart-item-title">${item.nama}</div>
                                    <div class="cart-item-category">${item.kategori}</div>
                                </div>
                                <div class="cart-item-actions">
                                    <span class="exclusive-badge">1 Pcs Only</span>
                                    <button class="remove-btn" onclick="removeFromCart(${item.id})"><i class="fa-solid fa-xmark"></i> Hapus</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            penandaJumlah.innerText = cart.length; 
        }

        function checkoutWA() {
            if(cart.length === 0) {
                showToast("Daftar Wishlist Anda masih kosong.");
                return;
            }

            const jam = new Date().getHours();
            let sapaan = "Selamat pagi";
            if (jam >= 11 && jam < 15) sapaan = "Selamat siang";
            else if (jam >= 15 && jam < 18) sapaan = "Selamat sore";
            else if (jam >= 18) sapaan = "Selamat malam";

            let isiPesan = `${sapaan} tim *CJR Couture*.\n\nSaya ingin memesan koleksi berikut:\n\n`;
            
            cart.forEach((item, index) => {
                isiPesan += `${index + 1}. *${item.nama}*\n    ▪ Kategori: ${item.kategori}\n\n`;
            });

            isiPesan += `Mohon informasi ketersediaan stok, terimakasih.`;

            const linkWhatsApp = `https://api.whatsapp.com/send?phone=${whatsappNumber}&text=${encodeURIComponent(isiPesan)}`;
            window.open(linkWhatsApp, '_blank');
        }

        window.onload = fetchData;
    </script>
</body>
</html>
